<script src="js/i18n.js"></script>
<script src="js/main.js"></script>
<script>
/* AUTH (shared) */
const AUTH_KEY='bunn_user',USERS_KEY='bunn_users';
function getUser(){try{return JSON.parse(localStorage.getItem(AUTH_KEY));}catch{return null;}}
function setUser(u){localStorage.setItem(AUTH_KEY,JSON.stringify(u));}
function clearUser(){localStorage.removeItem(AUTH_KEY);}
function updateUserNav(){
  const u=getUser(),btn=document.getElementById('userIconBtn'),g=document.getElementById('ddGuest'),l=document.getElementById('ddLoggedin'),w=document.getElementById('ddWelcome'),n=document.getElementById('ddName');
  if(u){btn.classList.add('logged-in');g.style.display='none';l.style.display='block';w.textContent='ສະບາຍດີ,';n.textContent=u.name||u.email;}
  else{btn.classList.remove('logged-in');g.style.display='block';l.style.display='none';w.textContent='ຍິນດີຕ້ອນຮັບ';n.textContent='bunnies.bunn';}
}
function toggleUserDrop(e){e.stopPropagation();document.getElementById('userDropdown').classList.toggle('open');}
document.addEventListener('click',e=>{const w=document.getElementById('userDropWrap');if(!w.contains(e.target))document.getElementById('userDropdown').classList.remove('open');});
function openAuth(t='login'){document.getElementById('userDropdown').classList.remove('open');document.getElementById('authOverlay').classList.add('open');document.body.style.overflow='hidden';switchAuthTab(t);clearMsgs();}
function closeAuth(){document.getElementById('authOverlay').classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAuth();});
function switchAuthTab(tab){const l=tab==='login';document.getElementById('tabLogin').classList.toggle('active',l);document.getElementById('tabRegister').classList.toggle('active',!l);document.getElementById('loginForm').style.display=l?'block':'none';document.getElementById('registerForm').style.display=l?'none':'block';document.getElementById('authSubtitle').textContent=l?'ເຂົ້າສູ່ລະບົບ bunnies.bunn':'ສ້າງບັນຊີໃໝ່';clearMsgs();}
function showErr(m){const e=document.getElementById('authError');e.textContent=m;e.style.display='block';document.getElementById('authSuccess').style.display='none';}
function showOk(m){const e=document.getElementById('authSuccess');e.textContent=m;e.style.display='block';document.getElementById('authError').style.display='none';}
function clearMsgs(){document.getElementById('authError').style.display='none';document.getElementById('authSuccess').style.display='none';}
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value;
  if(!u||!p){showErr('ກະລຸນາຕື່ມຂໍ້ມູນ');return;}
  try{const r=await fetch('api/auth.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',username:u,password:p})});const d=await r.json();if(d.success){setUser({name:d.name,email:d.email,id:d.id});showOk('ສຳເລັດ!');updateUserNav();setTimeout(closeAuth,1200);}else showErr(d.error||'ຂໍ້ມູນບໍ່ຖືກ');}
  catch{const us=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');const f=us.find(x=>(x.email===u||x.username===u)&&x.password===btoa(p));if(f){setUser({name:f.name,email:f.email,id:f.id});showOk('ສຳເລັດ!');updateUserNav();setTimeout(closeAuth,1200);}else showErr('ຂໍ້ມູນບໍ່ຖືກ');}
}
async function doRegister(){
  const name=document.getElementById('regName').value.trim(),email=document.getElementById('regEmail').value.trim(),pass=document.getElementById('regPass').value,pass2=document.getElementById('regPass2').value;
  if(!name||!email||!pass){showErr('ຕື່ມຂໍ້ມູນໃຫ້ຄົບ');return;}if(pass!==pass2){showErr('ລະຫັດຜ່ານບໍ່ກົງ');return;}if(pass.length<6){showErr('ຢ່າງໜ້ອຍ 6 ຕົວ');return;}
  try{const r=await fetch('api/auth.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'register',name,email,password:pass})});const d=await r.json();if(d.success){setUser({name,email,id:d.id});showOk('ສຳເລັດ!');updateUserNav();setTimeout(closeAuth,1400);}else showErr(d.error||'ຜິດພາດ');}
  catch{const us=JSON.parse(localStorage.getItem(USERS_KEY)||'[]');if(us.find(x=>x.email===email)){showErr('Email ຖືກໃຊ້ແລ້ວ');return;}const nu={id:Date.now(),name,email,username:email,password:btoa(pass)};us.push(nu);localStorage.setItem(USERS_KEY,JSON.stringify(us));setUser({name,email,id:nu.id});showOk('ສຳເລັດ!');updateUserNav();setTimeout(closeAuth,1400);}
}
function doLogout(){clearUser();updateUserNav();document.getElementById('userDropdown').classList.remove('open');}

/* PRODUCT */
let currentProduct=null, selectedColor='', selectedQty=1, selectedSizeIsOut=false, selectedSizeStock=null;
let galleryImages=[], galleryIdx=0;

/* ── Gallery ── */
function galleryGoto(idx, animate=true) {
  if(!galleryImages.length) return;
  idx = Math.max(0, Math.min(galleryImages.length-1, idx));
  galleryIdx = idx;
  const img = document.getElementById('mainImg');
  if(img) {
    if(animate) {
      img.classList.add('switching');
      setTimeout(()=>{ img.src=galleryImages[idx]; img.classList.remove('switching'); }, 200);
    } else {
      img.src = galleryImages[idx];
    }
  }
  // update counter
  const counter = document.getElementById('galleryCounter');
  if(counter) counter.textContent = (idx+1)+' / '+galleryImages.length;
  // update thumbs
  document.querySelectorAll('.thumb').forEach((t,i)=>{
    t.classList.toggle('active', i===idx);
    if(i===idx) t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
  // update arrows
  const prev = document.getElementById('galleryPrevBtn');
  const next = document.getElementById('galleryNextBtn');
  if(prev) prev.classList.toggle('hidden', idx===0);
  if(next) next.classList.toggle('hidden', idx===galleryImages.length-1);
}

function galleryPrev(){ galleryGoto(galleryIdx-1); }
function galleryNext(){ galleryGoto(galleryIdx+1); }

function initGallerySwipe(el) {
  let startX=0, startY=0;
  el.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; }, {passive:true});
  el.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){
      dx<0 ? galleryNext() : galleryPrev();
    }
  }, {passive:true});
}

/* ── Load product ── */
async function loadProduct(){
  const id=Utils.getParam('id');
  if(!id){location.href='index.html';return;}
  const p=await API.get(`products.php?action=single&id=${id}`);
  if(!p||p.error){location.href='index.html';return;}
  currentProduct=p;
  const colors=Array.isArray(p.colors)?p.colors:[];
  galleryImages=Array.isArray(p.images)?[...p.images]:[];
  if(p.image_url&&!galleryImages.includes(p.image_url))galleryImages.unshift(p.image_url);
  galleryIdx=0;
  selectedColor=colors[0]||'';
  document.title=(p.name_lo||p.name)+' — bunnies.bunn';
  document.title=(p.name_lo||p.name)+' — bunnies.bunn';

  const hasMulti = galleryImages.length > 1;
  const thumbsHtml = galleryImages.map((img,i)=>`
    <div class="thumb ${i===0?'active':''}" onclick="galleryGoto(${i})">
      <img src="${img}" alt="" loading="lazy" onerror="this.parentNode.style.display='none'">
    </div>`).join('');
  const colorsHtml=colors.map(c=>`<div class="color-option ${c===selectedColor?'selected':''}" style="background:${Utils.getColor(c)}" title="${c}" onclick="selectColor('${c}',this)"></div>`).join('');

  // sizes: prefer p.sizes (with per-size out-of-stock), fall back to dimensions
  const dimStr = (p.dimensions||'').trim();
  let sizeList = [];
  if (Array.isArray(p.sizes) && p.sizes.length) {
    sizeList = p.sizes.map(s => typeof s === 'string' ? {name:s} : s);
  } else {
    const isSizes = dimStr && !/\d+\s*[xX×]\s*\d+/.test(dimStr) && !/cm|mm|kg/i.test(dimStr) && dimStr.length < 60;
    if (isSizes) sizeList = dimStr.split(/[\s,\/]+/).filter(Boolean).map(n => ({name:n}));
  }
  const _getSizeStock = s => typeof s.stock === 'number' ? s.stock : (s.out ? 0 : null);
  const _isSizeOut   = s => { const k = _getSizeStock(s); return k !== null && k <= 0; };
  const firstAvail = sizeList.find(s => !_isSizeOut(s)) || sizeList[0] || {};
  let selectedSize = (firstAvail.name||firstAvail) || '';
  selectedSizeIsOut  = _isSizeOut(firstAvail);
  selectedSizeStock  = _getSizeStock(firstAvail);
  const sizeBtnsHtml = sizeList.map(s => {
    const n      = (s.name||s).toUpperCase();
    const stk    = _getSizeStock(s);
    const isOut  = _isSizeOut(s);
    const isActive = (s.name||s) === selectedSize;
    const stkJson = stk === null ? 'null' : stk;
    return `<button class="size-btn${isActive?' active':''}${isOut?' size-out':''}" data-size="${s.name||s}" onclick="selectSize(this,${stkJson})">${n}${isOut?'<span class="size-out-tag">ໝົດ</span>':''}</button>`;
  }).join('');

  document.getElementById('productContent').innerHTML=`
    <div class="product-detail-grid">
      <!-- LEFT: thumb col + main image -->
      <div class="product-images">
        ${hasMulti?`<div class="thumb-col" id="thumbCol">${thumbsHtml}</div>`:''}
        <div class="main-image-wrap" id="mainImageWrap" style="cursor:zoom-in" onclick="openLightbox(galleryIdx)">
          <img id="mainImg" src="${galleryImages[0]||''}" alt="${p.name||''}"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect fill=%22%23f5f5f5%22 width=%22400%22 height=%22400%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23ccc%22 font-size=%2248%22>🛍️</text></svg>'">
          <span class="gallery-counter" id="galleryCounter" style="display:${hasMulti?'block':'none'}">${hasMulti?'1 / '+galleryImages.length:''}</span>
          <button class="gallery-arrow prev hidden" id="galleryPrevBtn" onclick="event.stopPropagation();galleryPrev()">‹</button>
          <button class="gallery-arrow next ${!hasMulti?'hidden':''}" id="galleryNextBtn" onclick="event.stopPropagation();galleryNext()">›</button>
        </div>
      </div>

      <!-- RIGHT: info panel -->
      <div class="product-info-panel">
        <div class="product-cat-badge">${p.category_name_lo||p.category_name||''}</div>
        <h1 class="product-title">${p.name_lo||p.name}</h1>
        <div class="star-row"><span>★★★★☆</span><span>5 ຄອມເມັ້ນ</span></div>
        <div class="product-price-big">${Utils.fmt(p.price)}</div>

        ${colors.length?`<div class="option-label">ສີ</div><div class="color-options">${colorsHtml}</div><div id="selectedColorLabel" style="font-size:.88rem;color:var(--text-muted);margin-bottom:18px">ເລືອກ: <strong>${selectedColor}</strong></div>`:''}

        ${sizeList.length?`
        <div class="size-label">ເລືອກຂະໜາດ</div>
        <div class="size-grid" id="sizeGrid">${sizeBtnsHtml}</div>
        <div id="sizeStockInfo" style="margin:8px 0 4px;min-height:20px;font-size:.82rem"></div>
        <div id="sizePreNotice" style="display:${selectedSizeIsOut?'flex':'none'};align-items:center;gap:8px;background:#eef2ff;border:1px solid #a5b4fc;border-radius:8px;padding:8px 12px;margin:4px 0 10px;font-size:.78rem;color:#4338ca">
          📦 ຂະໜາດນີ້ <strong>Sold Out</strong> — Pre-Order ໄດ້ · ຮັບສິນຄ້າ <strong>7–14 ວັນ</strong>
        </div>`
        :`${dimStr?`<div class="meta-row" style="margin-bottom:18px"><span class="meta-label">ຂະໜາດ:</span><span>${dimStr}</span></div>`:''}`}

        ${(p.stock <= 0 || parseInt(p.pre_order) === 1) ? `
        <div style="display:flex;align-items:center;gap:10px;background:#eef2ff;border:1.5px solid #a5b4fc;border-radius:12px;padding:12px 16px;margin-bottom:16px">
          <span style="font-size:1.3rem">📦</span>
          <div>

  // init share links

  if(mainBtn && stickyBar) {
    const io = new IntersectionObserver(entries => {
      stickyBar.classList.toggle('visible', !entries[0].isIntersecting);
    }, { threshold: 0 });
    io.observe(mainBtn);
  }

  // keyboard arrows
  document.onkeydown = e=>{
    if(e.key==='ArrowLeft') galleryPrev();

    const related=await API.get(`products.php?category=${p.category_id}`);

      document.getElementById('relatedSection').style.display='block';
      document.getElementById('relatedGrid').innerHTML=others.slice(0,6).map(buildProductCard).join('');

/* ── Lightbox ── */
let lbIdx = 0;
function openLightbox(idx) {
  lbIdx = idx || 0;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function lbGo(dir) {
  lbIdx = ((lbIdx + dir) + galleryImages.length) % galleryImages.length;
  updateLightbox();
}
function updateLightbox() {
  const img = document.getElementById('lbImg');
  const counter = document.getElementById('lbCounter');
  if(img) img.src = galleryImages[lbIdx] || '';
  if(counter) counter.textContent = galleryImages.length > 1 ? `${lbIdx+1} / ${galleryImages.length}` : '';
  document.getElementById('lbPrev').style.display = galleryImages.length > 1 ? 'flex' : 'none';
  document.getElementById('lbNext').style.display = galleryImages.length > 1 ? 'flex' : 'none';
}
document.addEventListener('keydown', e => {
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key === 'Escape') closeLightbox();
  if(e.key === 'ArrowLeft')  lbGo(-1);
  if(e.key === 'ArrowRight') lbGo(1);
});
// swipe on lightbox
(function(){
  let tx=0;
  const lb = document.getElementById('lightbox');
  lb.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; }, {passive:true});
  lb.addEventListener('touchend',   e=>{
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>40) lbGo(dx<0?1:-1);
  }, {passive:true});
})();

function _renderSizeStockInfo(stk) {
  if (stk === null || stk === undefined) return '';
  if (stk <= 0) return '<span style="color:#6366f1">📦 Sold Out — Pre-Order ໄດ້</span>';
  if (stk <= 5)  return `<span style="color:#d97706">⚡ ເຫຼືອ <strong>${stk}</strong> ຊິ້ນ — ໃກ້ໝົດ</span>`;
  return `<span style="color:#16a34a">✓ ມີ <strong>${stk}</strong> ຊິ້ນ</span>`;
}

function selectSize(el, stk) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedSize     = el.dataset.size || el.textContent.trim().split('\n')[0].trim();
  selectedSizeStock = (stk === undefined || stk === null) ? null : Number(stk);
  selectedSizeIsOut = selectedSizeStock !== null && selectedSizeStock <= 0;
  const info = document.getElementById('sizeStockInfo');
  if (info) info.innerHTML = _renderSizeStockInfo(selectedSizeStock);
  _updateSizeCartState();
}

function _updateSizeCartState() {
  const btn    = document.getElementById('mainCartBtn');
  const notice = document.getElementById('sizePreNotice');
  if (!btn) return;
  const isProdPre = (currentProduct?.stock ?? 1) <= 0 || parseInt(currentProduct?.pre_order) === 1;
  if (selectedSizeIsOut) {
    btn.className = 'btn';
    btn.style.cssText = 'width:100%;margin-bottom:12px;padding:16px;font-size:1rem;background:#6366f1;color:#fff;border:none;border-radius:10px;cursor:pointer';
    btn.textContent = '📦 Pre-Order ຂະໜາດນີ້';
    if (notice) notice.style.display = 'flex';
  } else {
    if (notice) notice.style.display = 'none';
    if (isProdPre) {
      btn.className = 'btn';
      btn.style.cssText = 'width:100%;margin-bottom:12px;padding:16px;font-size:1rem;background:#6366f1;color:#fff;border:none;border-radius:10px;cursor:pointer';
      btn.textContent = '📦 Pre-Order — ສັ່ງລ່ວງໜ້າ';
    } else {
      btn.className = 'btn btn-primary';
      btn.style.cssText = 'width:100%;margin-bottom:12px;padding:16px;font-size:1rem';
      btn.textContent = '🛒 ໃສ່ກະຕ່າ';
    }
  }
}
function selectColor(color,el){selectedColor=color;document.querySelectorAll('.color-option').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');const l=document.getElementById('selectedColorLabel');if(l)l.innerHTML=`ເລືອກ: <strong>${color}</strong>`;}
function changeQty(delta){const input=document.getElementById('qtyInput');const max=currentProduct?.stock||99;selectedQty=Math.min(max,Math.max(1,parseInt(input.value)+delta));input.value=selectedQty;}
function addToCart(){
  if(!currentProduct)return;
  const prod = Object.assign({}, currentProduct, { is_preorder: (currentProduct.stock??1)<=0 || parseInt(currentProduct.pre_order)===1 || selectedSizeIsOut });
  Cart.add(prod, selectedQty, selectedColor);
}

function _initShareLinks() {
  const p    = currentProduct || {};
  const name = p.name_lo || p.name || '';
  const price = (p.price !== undefined && p.price !== null) ? '₭' + Number(p.price).toLocaleString() : '-';
  const sizes  = Array.isArray(p.sizes)  ? p.sizes.map(s => typeof s === 'string' ? s : s.name).join(', ') : '-';
  const colors = Array.isArray(p.colors) ? p.colors.join(', ') : '-';

  const bill = [
    '🛍️ *' + name + '*',
    '💰 ລາຄາ: ' + price,
    sizes  !== '-' ? '📐 ໄຊ: '  + sizes  : '',
    colors !== '-' ? '🎨 ສີ: '   + colors : '',
    '',
    '📍 *bunnies.bunn* — ແຟຊັ່ນລາວ',
    '📱 ສັ່ງ / ສອບຖາມ: 020 9545 7843',
    '🔗 facebook.com/bunnies.bunn'
  ].filter(Boolean).join('\n');

  const wa = document.getElementById('share-wa');
  if (wa) wa.href = 'https://wa.me/8562095457843?text=' + encodeURIComponent(bill);
}

function copyProductLink(btn) {
  navigator.clipboard.writeText(location.href).then(() => {
    const lbl = document.getElementById('share-copy-lbl');
    lbl.textContent = 'ສຳເນົາແລ້ວ ✓';
    btn.classList.add('copied');
    setTimeout(() => { lbl.textContent = 'ສຳເນົາລິ້ງ'; btn.classList.remove('copied'); }, 2200);
  }).catch(() => {});
}
function switchTab(id,el){document.querySelectorAll('.tab-panel').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+id)?.classList.add('active');el.classList.add('active');}

updateUserNav();
loadProduct();
</script>

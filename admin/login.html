<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - bunnies.bunn</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-box {
      background: white;
      border: 1px solid #e0e0e0;
      padding: 48px 40px;
    }

    .login-logo {
      font-family: 'Times New Roman', serif;
      font-size: 28px;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-subtitle {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-field {
      margin-bottom: 20px;
    }

    .login-field label {
      display: block;
      font-size: 12px;
      color: #777;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .login-field input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      font-family: 'Noto Sans Lao',sans-serif;
      font-size: 15px;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    .login-field input:focus {
      outline: none;
      border-color: #222;
      background: white;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #222;
      color: white;
      border: none;
      font-family: 'Noto Sans Lao',sans-serif;
      font-size: 15px;
      letter-spacing: 2px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .login-btn:hover   { background: #444; }
    .login-btn:active  { background: #000; }

    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error-msg {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc3333;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-msg.show { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
    }

    .login-footer a {
      color: #999;
      font-size: 13px;
      text-decoration: none;
    }

    .login-footer a:hover { color: #222; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-box">

    <div class="login-logo">bunnies.bunn</div>
    <div class="login-subtitle">Admin Panel</div>

    <div class="error-msg" id="error-msg">
      ❌ ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ
    </div>

    <div class="login-field">
      <label>ຊື່ຜູ້ໃຊ້</label>
      <input
        type="text"
        id="username"
        placeholder="admin"
        autocomplete="username"
        onkeydown="if(event.key==='Enter') focusPass()"
      >
    </div>

    <div class="login-field">
      <label>ລະຫັດຜ່ານ</label>
      <input
        type="password"
        id="password"
        placeholder="••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()"
      >
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">
      ເຂົ້າສູ່ລະບົບ
    </button>

    <div class="login-footer">
      <a href="../index.html">← ກັບໄປໜ້າຮ້ານ</a>
    </div>
  </div>
</div>

<!-- PHP login API (api/login.php) -->
<script>
  /* redirect if already holding a valid session */
  fetch('../api/admin-session.php', { credentials: 'same-origin' })
    .then(r => r.json())
    .then(d => { if (d.authed) location.replace('dashboard.html'); })
    .catch(() => {});

  function focusPass() {
    document.getElementById('password').focus();
  }

  async function doLogin() {
    const btn      = document.getElementById('login-btn');
    const errMsg   = document.getElementById('error-msg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      errMsg.textContent = '❌ ກະລຸນາໃສ່ຊື່ຜູ້ໃຊ້ ແລະ ລະຫັດຜ່ານ';
      errMsg.classList.add('show');
      return;
    }

    // Loading state
    btn.disabled    = true;
    btn.innerHTML   = '<span class="spinner"></span>ກຳລັງກວດສອບ...';
    errMsg.classList.remove('show');

    try {
      const res  = await fetch('../api/login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        btn.innerHTML = '✓ ສຳເລັດ!';
        setTimeout(() => location.href = 'dashboard.html', 600);
      } else {
        errMsg.textContent = '❌ ຊື່ຜູ້ໃຊ້ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ';
        errMsg.classList.add('show');
        btn.disabled  = false;
        btn.innerHTML = 'ເຂົ້າສູ່ລະບົບ';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch(e) {
      errMsg.textContent = '❌ ເຊື່ອມຕໍ່ server ບໍ່ໄດ້ ກະລຸນາລອງໃໝ່';
      errMsg.classList.add('show');
      btn.disabled  = false;
      btn.innerHTML = 'ເຂົ້າສູ່ລະບົບ';
    }
  }
</script>

</body>
</html>

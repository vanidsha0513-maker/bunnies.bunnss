<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ຈັດການໝວດໝູ່ — bunnies.bunn</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/admin-auth.js"></script>
  <style>
    body { background:#f4f4f2; margin:0; }

    .adm-sidebar {
      width:220px; background:#111; min-height:100vh;
      position:fixed; top:0; left:0; display:flex; flex-direction:column; z-index:100;
    }
    .adm-logo { padding:24px 20px 20px; font-family:'Times New Roman',serif; font-size:.85rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#fff; border-bottom:1px solid rgba(255,255,255,.08); }
    .adm-logo span { color:#c9a96e; }
    .adm-nav { padding:12px 0; flex:1; }
    .adm-nav a { display:flex; align-items:center; gap:10px; padding:12px 20px; font-size:.82rem; color:rgba(255,255,255,.6); text-decoration:none; transition:all .18s; border-left:3px solid transparent; }
    .adm-nav a:hover { color:#fff; background:rgba(255,255,255,.05); }
    .adm-nav a.active { color:#c9a96e; border-left-color:#c9a96e; background:rgba(201,169,110,.08); }
    .adm-footer { padding:16px 20px; border-top:1px solid rgba(255,255,255,.08); }
    .adm-footer a { display:flex; align-items:center; gap:8px; font-size:.78rem; color:rgba(255,255,255,.4); text-decoration:none; transition:color .18s; }
    .adm-footer a:hover { color:#c9a96e; }

    .adm-main { margin-left:220px; padding:32px; min-height:100vh; }
    .adm-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .adm-header h1 { font-family:'Noto Sans Lao',sans-serif; font-size:1.4rem; font-weight:700; color:#111; }

    .btn-add {
      display:flex; align-items:center; gap:6px;
      background:#111; color:#fff; border:none; padding:10px 20px;
      border-radius:8px; font-family:'Noto Sans Lao',sans-serif; font-size:.85rem;
      cursor:pointer; transition:background .2s;
    }
    .btn-add:hover { background:#333; }

    .tbl-card { background:#fff; border-radius:10px; border:1px solid #e8e4de; overflow:hidden; }
    .adm-table { width:100%; border-collapse:collapse; }
    .adm-table th { padding:11px 16px; text-align:left; font-size:.7rem; text-transform:uppercase; letter-spacing:1px; color:#aaa; background:#fafafa; border-bottom:1px solid #f0f0f0; font-weight:600; }
    .adm-table td { padding:14px 16px; border-bottom:1px solid #f7f7f7; font-size:.88rem; color:#333; vertical-align:middle; }
    .adm-table tr:last-child td { border-bottom:none; }
    .adm-table tr:hover td { background:#fafaf8; }

    .td-name { font-weight:700; color:#111; }
    .td-count {
      display:inline-block; background:#f0ede8; color:#666;
      font-size:.72rem; font-weight:700; padding:3px 10px;
      border-radius:20px;
    }
    .td-count.has-items { background:#e8f5e9; color:#2e7d32; }

    .btn-edit {
      background:none; border:1.5px solid #ddd; color:#555; padding:5px 14px;
      border-radius:6px; font-family:'Noto Sans Lao',sans-serif; font-size:.75rem;
      cursor:pointer; transition:all .15s; margin-right:4px;
    }
    .btn-edit:hover { border-color:#111; color:#111; }
    .btn-del {
      background:none; border:1.5px solid #fcc; color:#e74c3c; padding:5px 14px;
      border-radius:6px; font-family:'Noto Sans Lao',sans-serif; font-size:.75rem;
      cursor:pointer; transition:all .15s;
    }
    .btn-del:hover { background:#fde8e8; border-color:#e74c3c; }

    /* modal */
    .adm-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:none; align-items:center; justify-content:center; z-index:200;
    }
    .adm-overlay.open { display:flex; }
    .adm-modal {
      background:#fff; border-radius:14px; width:100%; max-width:440px;
      max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2);
    }
    .modal-head {
      padding:20px 24px; border-bottom:1px solid #f0f0f0;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; background:#fff; z-index:1;
    }
    .modal-head h2 { font-size:1rem; font-weight:700; color:#111; }
    .modal-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:#bbb; }
    .modal-close:hover { color:#555; }
    .modal-body { padding:20px 24px 24px; }
    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#888; margin-bottom:5px; }
    .fg input, .fg textarea {
      width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:8px;
      font-family:'Noto Sans Lao',sans-serif; font-size:.88rem; outline:none;
      transition:border-color .2s; background:#fff; box-sizing:border-box;
    }
    .fg input:focus, .fg textarea:focus { border-color:#c9a96e; }
    .fg textarea { resize:vertical; }
    .btn-save {
      width:100%; padding:13px; background:#111; color:#fff; border:none;
      border-radius:10px; font-family:'Noto Sans Lao',sans-serif; font-size:.95rem;
      font-weight:700; cursor:pointer; margin-top:6px; transition:background .2s;
    }
    .btn-save:hover { background:#333; }

    .tbl-empty { text-align:center; padding:48px 20px; color:#bbb; font-size:.85rem; }
    .tbl-empty .ei { font-size:2.5rem; margin-bottom:10px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="adm-sidebar">
  <div class="adm-logo">bunnies<span>.bunn</span></div>
  <nav class="adm-nav">
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="products.html">🛍️ ຈັດການສິນຄ້າ</a>
    <a href="categories.html" class="active">🗂️ ໝວດໝູ່</a>
    <a href="orders.html">📦 ລາຍງານການສັ່ງຊື້</a>
    <a href="reports.html">📈 ລາຍງານສະຫຼຸບ</a>
    <a href="preorders.html">🟣 Pre-Order</a>
    <a href="banners.html">🖼️ Banners</a>
  </nav>
  <div class="adm-footer">
    <a href="../index.html">🌐 ໜ້າຮ້ານ</a>
    <a class="adm-logout" href="#" onclick="adminLogout();return false;" style="margin-top:6px;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 14px;font-size:.75rem;font-weight:600">🚪 ອອກຈາກລະບົບ</a>
  </div>
</aside>

<!-- MAIN -->
<main class="adm-main">
  <div class="adm-header">
    <h1>ຈັດການໝວດໝູ່</h1>
    <button class="btn-add" onclick="openModal()">+ ເພີ່ມໝວດໝູ່</button>
  </div>

  <div class="tbl-card">
    <table class="adm-table">
      <thead>
        <tr>
          <th>#</th>
          <th>ຊື່ໝວດໝູ່</th>
          <th>ລາຍລະອຽດ</th>
          <th>ສິນຄ້າ</th>
          <th>ຈັດການ</th>
        </tr>
      </thead>
      <tbody id="catTbody">
        <tr><td colspan="5" class="tbl-empty"><div class="ei">⏳</div>ກຳລັງໂຫຼດ...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- MODAL -->
<div class="adm-overlay" id="adOverlay" onclick="if(event.target===this)closeModal()">
  <div class="adm-modal">
    <div class="modal-head">
      <h2 id="modal-title">ເພີ່ມໝວດໝູ່</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="c-id">
      <div class="fg">
        <label>ຊື່ໝວດໝູ່ *</label>
        <input type="text" id="c-name" placeholder="ເຊັ່ນ: ເສື້ອຜ້າ, ກະເປົ໋າ..." onkeydown="if(event.key==='Enter')saveCat()">
      </div>
      <div class="fg">
        <label>ລາຍລະອຽດ</label>
        <textarea id="c-desc" rows="3" placeholder="ລາຍລະອຽດໝວດໝູ່ (ບໍ່ບັງຄັບ)"></textarea>
      </div>
      <button class="btn-save" onclick="saveCat()">ບັນທຶກ</button>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script>
let cats = [];

async function loadCats() {
  const tbody = document.getElementById('catTbody');
  try {
    const res = await fetch('../api/categories.php');
    cats = await res.json();
    if (!cats.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="tbl-empty"><div class="ei">🗂️</div>ຍັງບໍ່ມີໝວດໝູ່</td></tr>';
      return;
    }
    tbody.innerHTML = cats.map((c, i) => `
      <tr>
        <td style="color:#bbb;font-size:.78rem">${i+1}</td>
        <td><div class="td-name">${c.name}</div></td>
        <td style="color:#888;font-size:.82rem">${c.description || '<span style="color:#ddd">—</span>'}</td>
        <td><span class="td-count ${c.product_count>0?'has-items':''}">${c.product_count} ລາຍການ</span></td>
        <td>
          <button class="btn-edit" onclick="editCat(${c.id})">ແກ້ໄຂ</button>
          <button class="btn-del"  onclick="delCat(${c.id},'${c.name}',${c.product_count})">ລຶບ</button>
        </td>
      </tr>`).join('');
  } catch {
    tbody.innerHTML = '<tr><td colspan="5" class="tbl-empty">ໂຫຼດຂໍ້ມູນບໍ່ໄດ້</td></tr>';
  }
}

function openModal(reset=true) {
  if (reset) {
    document.getElementById('c-id').value = '';
    document.getElementById('c-name').value = '';
    document.getElementById('c-desc').value = '';
    document.getElementById('modal-title').textContent = 'ເພີ່ມໝວດໝູ່';
  }
  document.getElementById('adOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('c-name').focus(), 100);
}

function closeModal() {
  document.getElementById('adOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function editCat(id) {
  const c = cats.find(x => x.id == id);
  if (!c) return;
  document.getElementById('c-id').value = c.id;
  document.getElementById('c-name').value = c.name;
  document.getElementById('c-desc').value = c.description || '';
  document.getElementById('modal-title').textContent = 'ແກ້ໄຂໝວດໝູ່';
  openModal(false);
}

async function saveCat() {
  const id   = document.getElementById('c-id').value;
  const name = document.getElementById('c-name').value.trim();
  const desc = document.getElementById('c-desc').value.trim();
  if (!name) { alert('ກະລຸນາໃສ່ຊື່ໝວດໝູ່'); return; }

  const method = id ? 'PUT' : 'POST';
  const body   = id ? { id, name, description: desc } : { name, description: desc };

  try {
    const res  = await fetch('../api/categories.php', {
      method, headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      closeModal();
      loadCats();
      showToast(id ? 'ແກ້ໄຂສຳເລັດ' : 'ເພີ່ມໝວດໝູ່ສຳເລັດ', 'success');
    } else {
      showAlert(data.error || 'ຜິດພາດ');
    }
  } catch { showAlert('ເຊື່ອມ server ບໍ່ໄດ້'); }
}

function delCat(id, name, count) {
  if (count > 0) {
    showAlert(`ໝວດໝູ່ "${name}" ມີສິນຄ້າ ${count} ລາຍການ\nກະລຸນາຍ້າຍສິນຄ້າໄປໝວດອື່ນກ່ອນ`,
      { title: 'ບໍ່ສາມາດລຶບໄດ້' });
    return;
  }
  showConfirm(`ລຶບໝວດໝູ່ "${name}" ແທ້ບໍ?`, async () => {
    try {
      const res  = await fetch('../api/categories.php?id=' + id, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) { loadCats(); showToast('ລຶບສຳເລັດ', 'info'); }
      else showAlert(data.error || 'ຜິດພາດ');
    } catch { showAlert('ເຊື່ອມ server ບໍ່ໄດ້'); }
  }, { danger: true, okLabel: 'ລຶບ', title: 'ລຶບໝວດໝູ່' });
}

loadCats();
</script>
<script src="../js/confirm.js"></script>
</body>
</html>

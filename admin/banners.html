<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Banner Slides — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f4f4f2;font-family:'Noto Sans Lao',sans-serif}
    .adm-sidebar{width:220px;background:#111;min-height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100}
    .adm-logo{padding:24px 20px 20px;font-family:'Times New Roman',serif;font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
    .adm-logo span{color:#c9a96e}
    .adm-nav{padding:12px 0;flex:1}
    .adm-nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:.82rem;color:rgba(255,255,255,.6);text-decoration:none;transition:all .18s;border-left:3px solid transparent}
    .adm-nav a:hover{color:#fff;background:rgba(255,255,255,.05)}
    .adm-nav a.active{color:#c9a96e;border-left-color:#c9a96e;background:rgba(201,169,110,.08)}
    .adm-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08)}
    .adm-footer a{display:flex;align-items:center;gap:8px;font-size:.78rem;color:rgba(255,255,255,.4);text-decoration:none}
    .adm-footer a:hover{color:#c9a96e}
    .adm-main{margin-left:220px;padding:32px 32px 60px}
    .adm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .adm-header h1{font-family:'Noto Sans Lao',sans-serif;font-size:1.4rem;font-weight:700;color:#111}

    /* ── Banner Grid ── */
    .banner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

    .banner-card{background:#fff;border-radius:12px;border:1px solid #e8e4de;overflow:hidden}
    .banner-preview{height:160px;background:#f5f5f5;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .banner-preview img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
    .banner-no-img{font-size:.8rem;color:#aaa;text-align:center}
    .banner-num{position:absolute;top:8px;left:10px;background:rgba(0,0,0,.55);color:#fff;font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.5px}
    .banner-del{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
    .banner-del:hover{background:rgba(200,40,40,.85)}

    .banner-body{padding:16px}
    .banner-label{font-weight:700;font-size:.82rem;color:#111;margin-bottom:12px}
    .drop-zone{border:2px dashed #ddd;border-radius:8px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa;position:relative}
    .drop-zone:hover,.drop-zone.over{border-color:#c9a96e;background:#fdf9f4}
    .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .dz-icon{font-size:1.4rem;margin-bottom:5px}
    .dz-text{font-size:.76rem;color:#aaa}

    .prog-wrap{height:3px;background:#f0ede8;border-radius:2px;margin-top:10px;overflow:hidden;display:none}
    .prog-fill{height:100%;background:#c9a96e;border-radius:2px;width:0%;transition:width .2s}
    .msg{margin-top:8px;font-size:.75rem;text-align:center;min-height:16px}
    .msg.ok{color:#27ae60}.msg.err{color:#e74c3c}

    /* add button card */
    .banner-add-card{background:#fff;border-radius:12px;border:2px dashed #ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:248px;cursor:pointer;transition:all .2s;color:#bbb;gap:10px}
    .banner-add-card:hover{border-color:#c9a96e;color:#c9a96e;background:#fdf9f4}
    .add-icon{font-size:2rem;line-height:1}
    .add-txt{font-size:.82rem;font-weight:600}

    .hint-bar{background:#fff;border:1px solid #e8e4de;border-radius:8px;padding:10px 16px;margin-bottom:20px;font-size:.78rem;color:#666;display:flex;align-items:center;gap:8px}
    .max-warn{color:#e74c3c;font-weight:700}
    @media(max-width:900px){.banner-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){.banner-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="adm-sidebar">
  <div class="adm-logo">bunnies<span>.bunn</span></div>
  <nav class="adm-nav">
    <a href="dashboard.html"><span>📊</span> Dashboard</a>
    <a href="products.html"><span>🛍️</span> ຈັດການສິນຄ້າ</a>
    <a href="orders.html"><span>🛒</span> ລາຍງານການສັ່ງຊື້</a>
    <a href="banners.html" class="active"><span>🖼️</span> Banner Slides</a>
  </nav>
  <div class="adm-footer"><a href="../index.html">🌐 ໄປໜ້າຮ້ານ</a></div>
</div>

<div class="adm-main">
  <div class="adm-header">
    <h1>🖼️ Banner Slides</h1>
    <span id="slide-count" style="font-size:.78rem;color:#aaa"></span>
  </div>

  <div class="hint-bar">
    💡 ຮູບທຳອິດ = Slide 1 · ສ້າງຮູບ <strong>1920 × 700 px</strong> ຈະສວຍທີ່ສຸດ · ລາກ-ວາງໄດ້
  </div>

  <div class="banner-grid" id="bannerGrid"></div>
</div>

<style>
  /* link input row */
  .link-row { margin-top:10px; }
  .link-row label { display:block; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#888; margin-bottom:5px; }
  .link-input-wrap { display:flex; align-items:center; gap:6px; }
  .link-input {
    flex:1; padding:8px 10px; border:1.5px solid #ddd; border-radius:6px;
    font-size:.8rem; font-family:inherit; outline:none; transition:border-color .2s;
  }
  .link-input:focus { border-color:#c9a96e; }
  .link-input.has-link { border-color:#27ae60; background:#f0fff4; }
  .link-badge { font-size:.68rem; padding:3px 8px; border-radius:20px; font-weight:700; white-space:nowrap; }
  .link-badge.on  { background:#e8f5e9; color:#27ae60; }
  .link-badge.off { background:#f5f5f5; color:#bbb; }
</style>

<script>
const STORE_KEY = 'bunn_banners';
const MAX_W = 1920, MAX_H = 700, QUALITY = 0.85;
const MAX_SLIDES = 8;
// banners = [{img: "dataurl", link: "product.html?id=3"}, ...]
let banners = [];

/* ── Storage ─────────────────────────────────── */
function load() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (s) {
      const parsed = JSON.parse(s);
      // migrate old format (array of strings → array of objects)
      banners = parsed.map(item =>
        typeof item === 'string' ? { img: item, link: '' } : item
      );
      return;
    }
    // migrate very old bunn_banner_1/2/3 format
    const old = [];
    for (let i = 1; i <= 10; i++) {
      const d = localStorage.getItem('bunn_banner_' + i);
      if (d) old.push({ img: d, link: '' }); else break;
    }
    banners = old;
    if (old.length) save();
  } catch { banners = []; }
}

function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(banners));
}

function saveLink(i) {
  const val = document.getElementById('link-' + i)?.value.trim() || '';
  banners[i].link = val;
  save();
  const badge = document.getElementById('badge-' + i);
  const input = document.getElementById('link-' + i);
  if (badge) { badge.textContent = val ? '🔗 ມີລິ້ງ' : 'ບໍ່ມີລິ້ງ'; badge.className = 'link-badge ' + (val?'on':'off'); }
  if (input) input.className = 'link-input' + (val?' has-link':'');
}

/* ── Compress image ──────────────────────────── */
function compress(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const ratio  = Math.min(1, MAX_W / img.width, MAX_H / img.height);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', QUALITY));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── Render ──────────────────────────────────── */
function render() {
  const grid  = document.getElementById('bannerGrid');
  const count = document.getElementById('slide-count');
  count.textContent = `${banners.length} / ${MAX_SLIDES} slides`;
  count.style.color = banners.length >= MAX_SLIDES ? '#e74c3c' : '#aaa';

  let html = banners.map((b, i) => {
    const hasLink = !!(b.link);
    return `
    <div class="banner-card" id="bc-${i}">
      <div class="banner-preview">
        <img src="${b.img}" style="display:block">
        <span class="banner-num">Slide ${i+1}${hasLink?' 🔗':''}</span>
        <button class="banner-del" onclick="removeBanner(${i})" title="ລຶບ">✕</button>
      </div>
      <div class="banner-body">
        <div class="banner-label">Slide ${i+1}</div>
        <div class="drop-zone"
             ondragover="event.preventDefault();this.classList.add('over')"
             ondragleave="this.classList.remove('over')"
             ondrop="handleDrop(event,${i})">
          <input type="file" accept="image/*" onchange="handleFile(this.files[0],${i})">
          <div class="dz-icon">🔄</div>
          <div class="dz-text">ຄລິກ ຫຼື ລາກ ເພື່ອປ່ຽນຮູບ</div>
        </div>
        <div class="prog-wrap" id="prog-${i}"><div class="prog-fill" id="fill-${i}"></div></div>
        <div class="msg" id="msg-${i}"></div>

        <!-- Link section -->
        <div class="link-row">
          <label>🔗 ລິ້ງ Promotion (ກົດ banner ໄປ)</label>
          <div class="link-input-wrap">
            <input id="link-${i}" class="link-input${hasLink?' has-link':''}"
                   type="text" placeholder="product.html?id=5  ຫຼື  index.html#shop"
                   value="${b.link||''}"
                   oninput="saveLink(${i})">
            <span id="badge-${i}" class="link-badge ${hasLink?'on':'off'}">${hasLink?'🔗 ມີລິ້ງ':'ບໍ່ມີລິ້ງ'}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  if (banners.length < MAX_SLIDES) {
    html += `
    <div class="banner-add-card" onclick="addSlot()">
      <div class="add-icon">+</div>
      <div class="add-txt">ເພີ່ມ Slide</div>
    </div>`;
  }

  grid.innerHTML = html;
}

/* ── Actions ─────────────────────────────────── */
function addSlot() {
  if (banners.length >= MAX_SLIDES) return;
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const idx = banners.length;
    banners.push({ img: '', link: '' });
    render();
    processFile(file, idx);
  };
  input.click();
}

function removeBanner(i) {
  showConfirm(`ຢືນຢັນລຶບ Slide ${i+1}?`, () => {
    banners.splice(i, 1);
    save(); render();
  }, { danger: true, okLabel: 'ລຶບ Slide', title: 'ລຶບ Slide' });
}

function handleDrop(e, i) {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) processFile(file, i);
}

function handleFile(file, i) { if (!file) return; processFile(file, i); }

function processFile(file, idx) {
  const prog = document.getElementById('prog-' + idx);
  const fill = document.getElementById('fill-' + idx);
  const msg  = document.getElementById('msg-'  + idx);
  if (!prog) return;
  prog.style.display = 'block'; fill.style.width = '0%';
  if (msg) { msg.className='msg'; msg.textContent='ກຳລັງປະມວນຜົນ...'; }
  let pct = 0;
  const tick = setInterval(() => { pct = Math.min(pct+10, 85); fill.style.width = pct+'%'; }, 60);
  compress(file, dataUrl => {
    clearInterval(tick); fill.style.width = '100%';
    banners[idx].img = dataUrl;
    save();
    setTimeout(() => { prog.style.display='none'; fill.style.width='0%'; render(); }, 350);
    if (msg) { msg.className='msg ok'; msg.textContent='✓ ບັນທຶກສຳເລັດ!'; }
  });
}

load(); render();
</script>
<script src="../js/confirm.js"></script>
</body>
</html>
